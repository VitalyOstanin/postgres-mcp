name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

# Least-privilege default. The CI workflow only needs to read the repo to
# build and test; jobs that need additional scopes should opt in explicitly.
permissions:
  contents: read

# Cancel in-flight runs on the same ref when a new commit lands. Saves CI
# minutes and avoids double-publishing intermediate artifacts.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x, 24.x]

    steps:
    - name: Checkout repository
      # actions/checkout pinned to v6.0.2
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

    - name: Setup Node.js ${{ matrix.node-version }}
      # actions/setup-node pinned to v6.4.0
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run linter
      run: npm run lint

    - name: Run typecheck
      run: npm run typecheck

    - name: Run tests with coverage
      run: npm run test:coverage

    - name: Upload coverage to Codecov
      # Run on a single matrix entry — uploading the same report twice
      # under different Node versions just creates noise on the Codecov side
      # without changing what we measure.
      if: matrix.node-version == '22.x'
      # codecov/codecov-action pinned to v6.0.0
      uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
      with:
        files: ./coverage/lcov.info
        flags: unit
        # Token is optional for public repos but Codecov v6 strongly
        # recommends it. Configure CODECOV_TOKEN under Settings → Secrets.
        token: ${{ secrets.CODECOV_TOKEN }}
        # Don't fail the build on Codecov outages — coverage drift is
        # signal, not a release blocker.
        fail_ci_if_error: false

    - name: Build project
      run: npm run build

    - name: Verify build output
      run: |
        test -f dist/index.js || { echo "Error: dist/index.js not found"; exit 1; }
        test -x dist/index.js || { echo "Error: dist/index.js is not executable"; exit 1; }
        echo "Build verification passed"

    - name: List build artifacts
      run: ls -lh dist/

  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Checkout repository
      # actions/checkout pinned to v6.0.2
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

    - name: Setup Node.js
      # actions/setup-node pinned to v6.4.0
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
      with:
        node-version: 22.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    # Production deps reach end users via the published package, so a high
    # or critical advisory there fails the build until it's resolved
    # (upgrade, override in package.json, or accepted-risk note in PR).
    - name: Audit production dependencies
      run: npm audit --omit=dev --audit-level=high

    # Dev-only advisories (build tooling, test runners) don't ship to
    # users — keep them visible in the run log but don't block PRs on
    # transient upstream advisories that have no production exposure.
    - name: Audit all dependencies (advisory only)
      run: npm audit --audit-level=high
      continue-on-error: true

  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x, 24.x]

    services:
      postgres:
        image: postgres:18.3-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U test -d test"
          --health-interval 1s
          --health-timeout 3s
          --health-retries 30

    steps:
    - name: Checkout repository
      # actions/checkout pinned to v6.0.2
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

    - name: Setup Node.js ${{ matrix.node-version }}
      # actions/setup-node pinned to v6.4.0
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    # `tsconfig.json` already includes `test-integration/**/*`, so
    # `npm run typecheck` covers integration-test sources. Re-run it here
    # against the same Postgres container/Node version used by the
    # integration suite, so a type error in a test fails this job up front
    # instead of surfacing only after the suite spins up.
    - name: Typecheck (incl. test-integration)
      run: npm run typecheck

    - name: Run linter
      run: npm run lint

    - name: Run integration tests
      run: npm run test:integration
