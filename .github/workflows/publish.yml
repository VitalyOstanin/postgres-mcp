name: Publish to npm

on:
  push:
    tags:
      - 'v*'

# Default to read-only; the publish job opts into the extra scopes it needs.
permissions:
  contents: read

# Two tag pushes for the same version should never race; serialize.
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Gate publishing on the `npm-publish` environment. Configure required
    # reviewers / branch restrictions / secret scoping under
    # Settings → Environments → npm-publish so a tag push alone cannot release.
    environment:
      name: npm-publish
      url: https://www.npmjs.com/package/@vitalyostanin/postgres-mcp

    permissions:
      contents: write  # Required for creating GitHub releases
      id-token: write  # Required for npm provenance

    steps:
    - name: Checkout repository
      # actions/checkout pinned to v4.3.1
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

    - name: Setup Node.js
      # actions/setup-node pinned to v4.4.0
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
      with:
        node-version: '22.x'
        registry-url: 'https://registry.npmjs.org'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run linter
      run: npm run lint

    - name: Run typecheck
      run: npm run typecheck

    - name: Run tests
      run: npm test

    - name: Build project
      run: npm run build

    - name: Verify package contents
      run: |
        echo "Package contents:"
        npm pack --dry-run

    - name: Smoke pack-and-install
      # Build a real tarball, install it into a clean throwaway project, and
      # exercise the bin entry. Catches issues that `npm pack --dry-run` can't:
      # missing files in the `files` allow-list, broken shebang, missing
      # runtime dependencies, wrong `bin` path. Tarball is discarded — the
      # actual publish below repacks from source.
      shell: bash
      run: |
        set -euo pipefail
        PACKAGE_TARBALL="$(npm pack --silent | tail -n 1)"
        echo "Built tarball: ${PACKAGE_TARBALL}"
        SMOKE_DIR="$(mktemp -d)"
        pushd "${SMOKE_DIR}" > /dev/null
        npm init -y > /dev/null
        npm install "${GITHUB_WORKSPACE}/${PACKAGE_TARBALL}" --no-save
        npx --no-install postgres-mcp --help
        popd > /dev/null
        rm -rf "${SMOKE_DIR}" "${PACKAGE_TARBALL}"
        echo "Smoke install OK"

    - name: Publish to npm
      run: npm publish --provenance --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release create ${{ github.ref_name }} \
          --title "Release ${{ github.ref_name }}" \
          --notes "Release of @vitalyostanin/postgres-mcp ${{ github.ref_name }}.

        Install:
        \`\`\`bash
        npm install @vitalyostanin/postgres-mcp@${{ github.ref_name }}
        \`\`\`

        See [CHANGELOG](https://github.com/VitalyOstanin/postgres-mcp/blob/${{ github.ref_name }}/CHANGELOG.md) for details."
